<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Faturas</title>
    <meta name="theme-color" content="#3b82f6">
    <link rel="icon" href="./icon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .tab-content { padding-bottom: 120px; } 
        [v-cloak] { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased font-sans">

<div id="app" v-cloak class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl relative">
    
    <!-- TELA DE LOGIN -->
    <div v-if="!user" class="flex-1 flex flex-col justify-center p-8 bg-gray-50">
        <div class="text-center mb-8">
            <span class="text-6xl">💳</span>
            <h1 class="text-2xl font-bold mt-4 text-blue-600">Gestor de Faturas</h1>
            <p class="text-gray-500 text-sm">Seus gastos sob controle</p>
        </div>

        <form @submit.prevent="handleAuth" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">E-mail</label>
                <input v-model="authForm.email" type="email" required class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Senha</label>
                <input v-model="authForm.password" type="password" required class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-blue-500 transition">
            </div>
            
            <button type="submit" :disabled="loading" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition disabled:opacity-50">
                {{ loading ? 'Processando...' : (authMode === 'login' ? 'Entrar' : 'Criar Conta') }}
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-500">
            {{ authMode === 'login' ? 'Não tem conta?' : 'Já tem conta?' }}
            <button @click="authMode = authMode === 'login' ? 'signup' : 'login'" class="text-blue-600 font-bold underline ml-1">
                {{ authMode === 'login' ? 'Cadastre-se' : 'Faça Login' }}
            </button>
        </p>
    </div>

    <!-- APP PRINCIPAL -->
    <template v-else>
        <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>💳</span> Gestor
            </h1>
            <div class="flex items-center gap-3">
                <span class="text-[10px] bg-blue-700 px-2 py-1 rounded-full border border-blue-400" :title="syncStatus">
                    {{ syncStatus === 'syncing' ? '⌛ Salvando...' : '🔒 Nuvem' }}
                </span>
                <button @click="logout" class="text-xs bg-red-500 px-2 py-1 rounded-md">Sair</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto tab-content p-4 bg-gray-50">
            <transition name="fade" mode="out-in">
                
                <!-- ABA LANÇAMENTOS -->
                <div v-if="currentTab === 'lancamentos'" key="lanc" class="space-y-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-lg font-semibold text-gray-700 mb-4">{{ isEditingTx ? 'Editar Lançamento' : 'Novo Lançamento' }}</h2>
                        <form @submit.prevent="addTransaction" class="space-y-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">Descrição</label>
                                <input v-model="formTx.description" type="text" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500" placeholder="Ex: Netflix, Mercado">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <div class="flex justify-between items-center mb-1">
                                        <label class="block text-xs font-medium text-gray-500">Valor</label>
                                        <select v-if="formTx.type === 'installment'" v-model="formTx.amountType" class="text-[10px] bg-blue-50 text-blue-700 border border-blue-200 rounded px-1 py-0.5 outline-none font-medium">
                                            <option value="total">Total</option>
                                            <option value="installment">Parcela</option>
                                        </select>
                                    </div>
                                    <input v-model.number="formTx.amount" type="number" step="0.01" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500" placeholder="R$ 0,00">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-500 mb-1">Data</label>
                                    <input v-model="formTx.date" type="date" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-medium text-gray-500 mb-1">Cartão</label>
                                    <select v-model="formTx.cardId" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500">
                                        <option disabled value="">Selecione...</option>
                                        <option v-for="card in cards" :value="card.id" :key="card.id">{{ card.name }}</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-500 mb-1">Dono</label>
                                    <select v-model="formTx.person" @change="handlePersonChange" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500">
                                        <option v-for="p in people" :value="p" :key="p">{{ p }}</option>
                                        <option value="NEW_PERSON" class="font-bold text-blue-600">+ Nova Pessoa...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-medium text-gray-500 mb-1">Tipo</label>
                                    <select v-model="formTx.type" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500">
                                        <option value="single">À Vista</option>
                                        <option value="installment">Parcelada</option>
                                        <option value="subscription">Mensal</option>
                                    </select>
                                </div>
                                <div v-if="formTx.type === 'installment'">
                                    <label class="block text-xs font-medium text-gray-500 mb-1">Parcelas</label>
                                    <input v-model.number="formTx.installments" type="number" min="2" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500">
                                </div>
                            </div>
                            <div class="flex gap-2 mt-2">
                                <button v-if="isEditingTx" type="button" @click="cancelEditTx" class="w-1/3 bg-gray-200 text-gray-700 py-2.5 rounded-lg font-medium">Cancelar</button>
                                <button type="submit" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-medium shadow shadow-blue-200">
                                    {{ isEditingTx ? 'Atualizar' : 'Salvar' }}
                                </button>
                            </div>
                        </form>
                    </div>

                    <div>
                        <h3 class="text-md font-semibold text-gray-700 mb-3">Recentes</h3>
                        <div v-if="transactions.length === 0" class="text-center text-gray-400 text-sm py-4 italic">Nenhum lançamento.</div>
                        <div class="space-y-2">
                            <div v-for="tx in [...transactions].reverse().slice(0,10)" :key="tx.id" class="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                                <div class="flex-1 pr-2">
                                    <p class="font-medium text-gray-800 text-sm">{{ tx.description }}</p>
                                    <p class="text-[10px] text-gray-400">
                                        {{ getCardName(tx.cardId) }} • <span :style="{color: getPersonColor(tx.person)}">{{ tx.person }}</span>
                                    </p>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-gray-800 text-sm">{{ formatMoney(tx.amount) }}</p>
                                    <div class="flex gap-2 mt-1">
                                        <button @click="editTransaction(tx)" class="text-blue-500 p-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                                        <button @click="deleteTransaction(tx.id)" class="text-red-500 p-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ABA RELATÓRIOS -->
                <div v-else-if="currentTab === 'relatorios'" key="rel" class="space-y-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-lg font-semibold text-gray-700 mb-4">Fatura Mensal</h2>
                        <input v-model="reportMonth" type="month" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none mb-6">

                        <div v-if="!currentInvoiceData" class="text-center text-gray-400 py-8 italic">Nada para este mês.</div>
                        <div v-else class="space-y-4">
                            <div class="p-4 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-100">
                                <p class="text-xs opacity-80">Total Geral</p>
                                <p class="text-2xl font-bold">{{ formatMoney(currentInvoiceData.total) }}</p>
                            </div>

                            <div v-for="(data, personName) in currentInvoiceData.byPerson" :key="personName" class="border border-gray-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                                <div class="bg-gray-50 p-3 flex justify-between items-center border-b border-gray-100">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2.5 h-2.5 rounded-full" :style="{ backgroundColor: getPersonColor(personName) }"></span>
                                        <span class="font-bold text-sm text-gray-700">{{ personName }}</span>
                                    </div>
                                    <div class="flex gap-2">
                                        <button @click="togglePayment(reportMonth, personName)" class="text-[10px] px-2 py-1 rounded-full font-bold transition" :class="payments[reportMonth]?.[personName] ? 'bg-green-100 text-green-600' : 'bg-gray-200 text-gray-500'">
                                            {{ payments[reportMonth]?.[personName] ? 'PAGO' : 'PENDENTE' }}
                                        </button>
                                        <button @click="exportToWhatsApp(personName, data.total, data.items)" class="bg-green-500 text-white p-1.5 rounded-lg"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.418-.099.823z"/></svg></button>
                                    </div>
                                </div>
                                <div class="p-3">
                                    <p class="text-lg font-bold text-gray-800 mb-2" :class="{'line-through opacity-50': payments[reportMonth]?.[personName]}">{{ formatMoney(data.total) }}</p>
                                    <div class="space-y-1">
                                        <div v-for="item in data.items" :key="item.id" class="flex justify-between text-xs text-gray-500">
                                            <span>{{ item.desc }} {{ item.parcelaInfo }}</span>
                                            <span>{{ formatMoney(item.amount) }}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ABA AJUSTES -->
                <div v-else-if="currentTab === 'config'" key="conf" class="space-y-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-lg font-semibold text-gray-700 mb-4">Cartões</h2>
                        <form @submit.prevent="addCard" class="space-y-2 mb-4">
                            <input v-model="formCard.name" placeholder="Nome (Ex: Nubank)" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
                            <div class="grid grid-cols-2 gap-2">
                                <input v-model.number="formCard.closingDay" type="number" placeholder="Fecha dia" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
                                <input v-model.number="formCard.dueDay" type="number" placeholder="Vence dia" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
                            </div>
                            <button type="submit" class="w-full bg-gray-800 text-white py-2 rounded-lg text-sm font-bold">Salvar Cartão</button>
                        </form>
                        <div class="space-y-2">
                            <div v-for="card in cards" :key="card.id" class="flex justify-between items-center bg-gray-50 p-2 rounded-lg text-sm">
                                <span class="font-bold">{{ card.name }} ({{card.closingDay}}/{{card.dueDay}})</span>
                                <button @click="deleteCard(card.id)" class="text-red-500 p-1">Excluir</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-lg font-semibold text-gray-700 mb-4">Pessoas</h2>
                        <div class="flex gap-2 mb-4">
                            <input v-model="newPerson" placeholder="Novo nome" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none">
                            <button @click="addPerson" class="bg-blue-600 text-white px-4 rounded-lg">+</button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <span v-for="p in people" :key="p" class="bg-gray-100 px-3 py-1.5 rounded-full text-xs flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full" :style="{backgroundColor: getPersonColor(p)}"></span>
                                {{ p }}
                                <button v-if="p !== 'Eu'" @click="removePerson(p)" class="text-red-500 font-bold ml-1">×</button>
                            </span>
                        </div>
                    </div>
                </div>
            </transition>
        </main>

        <nav class="bg-white border-t border-gray-100 fixed bottom-0 w-full max-w-md mx-auto flex justify-around p-2 pb-6 z-20 shadow-[0_-1px_10px_rgba(0,0,0,0.05)]">
            <button @click="currentTab = 'lancamentos'" :class="currentTab === 'lancamentos' ? 'text-blue-600' : 'text-gray-400'" class="flex flex-col items-center p-2">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                <span class="text-[10px] font-bold">Lançar</span>
            </button>
            <button @click="currentTab = 'relatorios'" :class="currentTab === 'relatorios' ? 'text-blue-600' : 'text-gray-400'" class="flex flex-col items-center p-2">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="text-[10px] font-bold">Faturas</span>
            </button>
            <button @click="currentTab = 'config'" :class="currentTab === 'config' ? 'text-blue-600' : 'text-gray-400'" class="flex flex-col items-center p-2">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                <span class="text-[10px] font-bold">Ajustes</span>
            </button>
        </nav>
    </template>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc, enableMultiTabIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCXao0he_pS1dquJPGRbkjhFeeWPkQqxsw",
        authDomain: "gestorfaturas-4e199.firebaseapp.com",
        projectId: "gestorfaturas-4e199",
        storageBucket: "gestorfaturas-4e199.firebasestorage.app",
        messagingSenderId: "779508869408",
        appId: "1:779508869408:web:c1883d5d22832f1c254f45"
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);

    // Persistência Offline
    enableMultiTabIndexedDbPersistence(db).catch((err) => {
        if (err.code == 'failed-precondition') console.log("Multi-tab não suportado");
        else if (err.code == 'unimplemented') console.log("Navegador não suportado");
    });

    const { createApp, ref, reactive, computed, watch, onMounted } = Vue;

    const COLOR_PALETTE = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', '#f43f5e'];

    createApp({
        setup() {
            const user = ref(null);
            const loading = ref(false);
            const authMode = ref('login');
            const authForm = reactive({ email: '', password: '' });
            const syncStatus = ref('idle');

            const currentTab = ref('lancamentos');
            const reportMonth = ref(new Date().toISOString().slice(0, 7));

            // Dados sincronizados
            const cards = ref([]);
            const people = ref(['Eu']);
            const transactions = ref([]);
            const payments = ref({});
            const personColors = ref({'Eu': '#3b82f6'});

            // Formulários
            const formCard = reactive({ name: '', closingDay: 1, dueDay: 10 });
            const formTx = reactive({ description: '', amount: null, amountType: 'total', date: new Date().toISOString().slice(0, 10), cardId: '', person: 'Eu', type: 'single', installments: 2 });
            const newPerson = ref('');
            const isEditingTx = ref(null);

            // --- SINCRONIZAÇÃO FIRESTORE (Otimizada: 1 Doc per User) ---
            let unsubscribeStore = null;
            const startSync = (uid) => {
                // Caminho conforme instrução: /artifacts/{appId}/users/{userId}/{collectionName}
                // Usamos 'appData' como coleção e 'main' como o documento único com TUDO dentro.
                const docRef = doc(db, 'artifacts', 'gestor-faturas', 'users', uid, 'appData', 'main');
                
                unsubscribeStore = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        cards.value = data.cards || [];
                        people.value = data.people || ['Eu'];
                        transactions.value = data.transactions || [];
                        payments.value = data.payments || {};
                        personColors.value = data.personColors || {'Eu': '#3b82f6'};
                        
                        // Garante cartão padrão se houver
                        if(!formTx.cardId && cards.value.length > 0) formTx.cardId = cards.value[0].id;
                    }
                });
            };

            const pushToCloud = async () => {
                if (!user.value) return;
                syncStatus.value = 'syncing';
                try {
                    const docRef = doc(db, 'artifacts', 'gestor-faturas', 'users', user.value.uid, 'appData', 'main');
                    await setDoc(docRef, {
                        cards: cards.value,
                        people: people.value,
                        transactions: transactions.value,
                        payments: payments.value,
                        personColors: personColors.value,
                        updatedAt: new Date().toISOString()
                    });
                } catch (e) { console.error(e); }
                syncStatus.value = 'idle';
            };

            // Debounce para evitar muitas escritas seguidas
            let timer;
            watch([cards, people, transactions, payments, personColors], () => {
                clearTimeout(timer);
                timer = setTimeout(pushToCloud, 2000);
            }, { deep: true });

            // --- AUTH ---
            const handleAuth = async () => {
                loading.value = true;
                try {
                    if (authMode.value === 'login') {
                        await signInWithEmailAndPassword(auth, authForm.email, authForm.password);
                    } else {
                        await createUserWithEmailAndPassword(auth, authForm.email, authForm.password);
                    }
                } catch (e) {
                    alert("Erro: " + e.message);
                }
                loading.value = false;
            };

            const logout = () => signOut(auth);

            onMounted(() => {
                onAuthStateChanged(auth, (u) => {
                    user.value = u;
                    if (u) {
                        startSync(u.uid);
                    } else {
                        if (unsubscribeStore) unsubscribeStore();
                    }
                });
            });

            // --- LÓGICA DO APP (Mantida conforme original) ---
            const getPersonColor = (name) => {
                if (!personColors.value[name]) {
                    personColors.value[name] = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
                }
                return personColors.value[name];
            };

            const getInvoiceMonth = (pDate, cDay, dDay) => {
                const [y, m, d] = pDate.split('-').map(Number);
                let targetM = m; let targetY = y;
                if (d >= (cDay || 31)) targetM++;
                if ((dDay || 10) <= (cDay || 31)) targetM++;
                while (targetM > 12) { targetM -= 12; targetY++; }
                return `${targetY}-${String(targetM).padStart(2, '0')}`;
            };

            const addMonths = (yyyyMM, n) => {
                const [y, m] = yyyyMM.split('-').map(Number);
                let tM = m + n; let tY = y;
                while (tM > 12) { tM -= 12; tY++; }
                return `${tY}-${String(tM).padStart(2, '0')}`;
            };

            const projectedInvoices = computed(() => {
                const invs = {};
                transactions.value.forEach(tx => {
                    const card = cards.value.find(c => c.id === tx.cardId);
                    if (!card) return;
                    const startMonth = getInvoiceMonth(tx.date, card.closingDay, card.dueDay);
                    const reps = tx.type === 'subscription' ? 24 : (tx.type === 'installment' ? tx.installments : 1);
                    const val = tx.type === 'installment' ? tx.amount / tx.installments : tx.amount;

                    for (let i = 0; i < reps; i++) {
                        const m = addMonths(startMonth, i);
                        if (!invs[m]) invs[m] = { total: 0, byPerson: {} };
                        if (!invs[m].byPerson[tx.person]) invs[m].byPerson[tx.person] = { total: 0, items: [] };
                        invs[m].total += val;
                        invs[m].byPerson[tx.person].total += val;
                        invs[m].byPerson[tx.person].items.push({ 
                            id: tx.id, desc: tx.description, amount: val, 
                            parcelaInfo: tx.type === 'installment' ? `(${i+1}/${tx.installments})` : '' 
                        });
                    }
                });
                return invs;
            });

            const currentInvoiceData = computed(() => projectedInvoices.value[reportMonth.value] || null);

            // Métodos de interação
            const addTransaction = () => {
                const finalAmt = (formTx.type === 'installment' && formTx.amountType === 'installment') ? formTx.amount * formTx.installments : formTx.amount;
                if (isEditingTx.value) {
                    const idx = transactions.value.findIndex(t => t.id === isEditingTx.value);
                    if (idx !== -1) transactions.value[idx] = { ...formTx, id: isEditingTx.value, amount: finalAmt };
                    cancelEditTx();
                } else {
                    transactions.value.push({ ...formTx, id: Date.now().toString(), amount: finalAmt });
                    formTx.description = ''; formTx.amount = null;
                }
            };

            const editTransaction = (tx) => { isEditingTx.value = tx.id; Object.assign(formTx, tx); currentTab.value = 'lancamentos'; };
            const cancelEditTx = () => { isEditingTx.value = null; formTx.description = ''; formTx.amount = null; };
            const deleteTransaction = (id) => { if(confirm("Excluir?")) transactions.value = transactions.value.filter(t => t.id !== id); };
            const togglePayment = (m, p) => { 
                if (!payments.value[m]) payments.value[m] = {};
                if (payments.value[m][p]) delete payments.value[m][p];
                else payments.value[m][p] = true;
            };

            const addCard = () => {
                cards.value.push({ ...formCard, id: Date.now().toString() });
                formCard.name = '';
            };
            const deleteCard = (id) => { cards.value = cards.value.filter(c => c.id !== id); };
            const addPerson = () => { if (newPerson.value && !people.value.includes(newPerson.value)) { people.value.push(newPerson.value); newPerson.value = ''; } };
            const removePerson = (p) => { people.value = people.value.filter(x => x !== p); };
            const handlePersonChange = () => { if (formTx.person === 'NEW_PERSON') { const n = prompt("Nome:"); if(n) { people.value.push(n); formTx.person = n; } else formTx.person = 'Eu'; } };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
            const getCardName = (id) => cards.value.find(c => c.id === id)?.name || '...';
            const exportToWhatsApp = (name, total, items) => {
                let msg = `*Fatura ${reportMonth.value}*\nOlá ${name}, sua parte é *${formatMoney(total)}*.\n\n`;
                items.forEach(i => msg += `- ${i.desc} ${i.parcelaInfo}: ${formatMoney(i.amount)}\n`);
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return {
                user, loading, authMode, authForm, handleAuth, logout, syncStatus,
                currentTab, reportMonth, cards, people, transactions, payments,
                formCard, formTx, newPerson, isEditingTx,
                addTransaction, editTransaction, cancelEditTx, deleteTransaction, togglePayment,
                addCard, deleteCard, addPerson, removePerson, handlePersonChange,
                getPersonColor, currentInvoiceData, formatMoney, getCardName, exportToWhatsApp
            };
        }
    }).mount('#app');
</script>
</body>
</html>
